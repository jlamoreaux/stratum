name = "stratum"
main = "src/index.ts"
compatibility_date = "2026-04-29"
compatibility_flags = ["nodejs_compat"]

[[artifacts]]
binding = "ARTIFACTS"
namespace = "default"

[[kv_namespaces]]
binding = "STATE"
id = "2285977f426647cf9e3db347cbc0f03b"

[[d1_databases]]
binding = "DB"
database_name = "stratum"
database_id = "de9b583b-d5f3-4868-a1eb-2208b76c7062"
migrations_dir = "migrations"

[[analytics_engine_datasets]]
binding = "ANALYTICS"
dataset = "stratum_requests"

[ai]
binding = "AI"

[[durable_objects.bindings]]
name = "MERGE_QUEUE"
class_name = "MergeQueue"
script_name = "stratum"

[[queues.producers]]
binding = "EVENTS_QUEUE"
queue = "stratum-events"

[[queues.consumers]]
queue = "stratum-events"

[triggers]
crons = ["0 6 * * *"]

[vars]
POSTHOG_HOST = "https://app.posthog.com"
OAUTH_REDIRECT_URI = "http://localhost:8787/auth/github/callback"

# Sandboxes binding — beta feature, only available with Cloudflare Sandboxes access
# [[sandboxes]]
# binding = "SANDBOX"

# Secrets — set via: wrangler secret put <NAME>
# POSTHOG_API_KEY =
# STRATUM_TELEMETRY_DISABLED = "true"  # uncomment to disable telemetry for self-hosted
# GITHUB_CLIENT_ID =
# GITHUB_CLIENT_SECRET =

# Staging environment
[env.staging]
name = "stratum-staging"

[[migrations]]
tag = "v1"
new_classes = ["MergeQueue"]

[[env.staging.artifacts]]
binding = "ARTIFACTS"
namespace = "default"

[[env.staging.kv_namespaces]]
binding = "STATE"
id = "18a609aeddac442087de919a12677856"

[[env.staging.d1_databases]]
binding = "DB"
database_name = "stratum-staging"
database_id = "85c63ac2-381e-4cd9-9c35-e89dad02df65"
migrations_dir = "migrations"

[[env.staging.analytics_engine_datasets]]
binding = "ANALYTICS"
dataset = "stratum_requests"

[env.staging.ai]
binding = "AI"

[[env.staging.durable_objects.bindings]]
name = "MERGE_QUEUE"
class_name = "MergeQueue"
script_name = "stratum-staging"

[[env.staging.queues.producers]]
binding = "EVENTS_QUEUE"
queue = "stratum-events"

# Note: Only production should consume from the queue
# [[env.staging.queues.consumers]]
# queue = "stratum-events"

[env.staging.vars]
POSTHOG_HOST = "https://app.posthog.com"
OAUTH_REDIRECT_URI = "https://stratum-staging.jlmx.workers.dev/auth/github/callback"
